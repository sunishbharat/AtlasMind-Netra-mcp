name: Build & Push Multi-Platform Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # Enables arm64 cross-compilation on the amd64 GitHub runner.
        # Future optimisation: split into two native-runner jobs and merge
        # with imagetools (removes QEMU, ~3-4x faster arm64 build).

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sunishbharat/atlasmind-netra-mcp:${{ github.sha }}
            ghcr.io/sunishbharat/atlasmind-netra-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GitHub Actions cache speeds up repeat builds when only app source
          # changes - the dependency layer is served from cache.
